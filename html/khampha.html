<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám Phá - Phúc Khang Music</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>
<body>
    <!-- Thanh điều hướng (Giữ nguyên) -->
    <header>
        <div class="logo">
            <h2>Phúc Khang Music</h2>
        </div>
        <nav>
            <ul>
                <!-- Link về lại trang chủ -->
                <li><a href="home.html">Trang chủ</a></li> 
                <li><a href="khampha.html" style="color: white; font-weight: bold;">Khám Phá </a></li>
                <li><a href="#">Nhạc hay</a></li>
                <li><a href="#">Nghệ Sĩ </a></li>
                <li><a href="#">Cộng Đồng</a></li>
            </ul>
        </nav>
        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>
    </header>

    <main>
        <!-- KHU VỰC KHÁM PHÁ THEO CHỦ ĐỀ -->
        <section class="discover-section">
            <div class="section-title-row">
                <h2>Chủ Đề</h2>
                <a href="#" class="view-more">Thêm</a>
            </div>

            <!-- Lưới chứa các chủ đề (Grid 5 cột) -->
            <div class="topic-grid">
                
                <!-- Ô 1 -->
                <div class="topic-card bg-1" onclick="window.location.href='rapviet.html'">
                    <h3>Rap Việt</h3>
                    <img src="../imagesanh/anhrapviet.jpg" alt="Rap Việt">
                </div>

                <!-- Ô 2 -->
                <div class="topic-card bg-1" onclick="window.location.href='remix.html'">
                    <h3>Remix</h3>
                    <img src="../imagesanh/remixx.jpg" alt="Remix">
                </div>

                <!-- Ô 3 -->
                <div class="topic-card bg-1"onclick="window.location.href='pop.html'">
                    <h3>Pop</h3>
                    <img src="../imagesanh/pop.jpg" alt="Pop">
                </div>

                <!-- Ô 4 -->
                <div class="topic-card bg-1"onclick="window.location.href='trending.html'">
                    <h3>Nhạc Trending</h3>
                    <img src="../imagesanh/trending.jpg" alt="Nhạc Trending">
                </div>

                <!-- Ô 5 -->
                <div class="topic-card bg-1" onclick="window.location.href='chill.html'">
                    <h3>Chill Out</h3>
                    <img src="../imagesanh/chill.jpg" alt="Chill Out">
                </div>

                <!-- Ô 6 -->

                <!-- Ô 9 -->
               

            </div>
        </section>
    </main>

    <!-- Chân trang và Thanh phát nhạc (Copy y chang trang chủ qua) -->
    <footer>
        <p> 2026 Phúc Khang Music. Học phần Nhập môn Web.</p>
    </footer>

    <div id="player-bar" class="player-bar">
        <div class="player-info">
            <img id="player-img" src="" alt="Song Cover">
            <div class="song-details">
                <span class="now-playing">NOW PLAYING:</span>
                <h4 id="player-title">Tên bài hát</h4>
                <p id="player-artist">Tên ca sĩ</p>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" onclick="nextOrPrev('prev')">⏮</button>
            <button id="play-pause-btn" onclick="togglePlay()">⏸</button>
            <button class="control-btn" onclick="nextOrPrev('next')">⏭</button>
        </div>
        <div class="player-volume">
            <span>🔊</span>
            <input type="range" min="0" max="100" value="50">
        </div>
    </div>

    <audio id="myAudio"></audio>
    <script src="../java.js"></script>
</body>
</html>
